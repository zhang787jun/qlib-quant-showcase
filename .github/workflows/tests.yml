name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run sample factor research
        run: python scripts/run_factor_research.py --source sample
      - name: Run sample strategy backtest
        run: python scripts/run_strategy_backtest.py --source sample
      - name: Run tests
        run: pytest -q
